name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (e.g., 0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  actions: read

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false
  ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

jobs:
  # ── Build & release (tag push or manual dispatch) ────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: windows-latest
            build-cmd: pnpm run build && electron-builder --win --publish always
          - os: macos-latest
            build-cmd: pnpm run build && electron-builder --mac --publish always
          - os: ubuntu-latest
            build-cmd: pnpm run build && electron-builder --linux --publish always
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Bump version (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          echo "Bumped to v${{ inputs.version }}"

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~\AppData\Local\electron\cache
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 15

      - name: Build & publish (${{ matrix.os }})
        run: ${{ matrix.build-cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ThunderSub-${{ github.ref_name || inputs.version }}-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.zip
            release/*.blockmap
            release/*.yml
            release/*.json
          if-no-files-found: ignore

  # ── CI check on every push / PR (quick build, no release) ───
  ci:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event_name != 'workflow_dispatch' }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~\AppData\Local\electron\cache
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 15

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm run build
